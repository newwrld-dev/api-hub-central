services:
  - type: web
    name: popkid-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.20.1"
      - key: NODE_ENV
        value: production
      - key: LOVABLE_API_KEY
        sync: false
